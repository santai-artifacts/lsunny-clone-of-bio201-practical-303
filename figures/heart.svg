<svg viewBox="-10 -90 420 530" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">

  <!-- chambers -->
  <ellipse cx="140" cy="150" rx="70" ry="60" fill="#c0392b"/>
  <ellipse cx="260" cy="150" rx="70" ry="60" fill="#a93226"/>
  <ellipse cx="140" cy="270" rx="80" ry="80" fill="#e74c3c"/>
  <ellipse cx="260" cy="270" rx="80" ry="80" fill="#cb4335"/>

  <!-- vessels -->
  <rect x="240" y="20" width="26" height="90" rx="13" fill="#7f8c8d"/>
  <rect x="170" y="30" width="24" height="80" rx="12" fill="#2980b9"/>
  <rect x="95"  y="30" width="20" height="90" rx="10" fill="#2471a3"/>
  <rect x="100" y="330" width="20" height="70" rx="10" fill="#1f618d"/>

  <!-- leader lines — SVC and Aorta at top tier (-66), Pulmonary Artery at mid tier (-38) -->
  <line x1="105" y1="-60" x2="105" y2="30" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="182" y1="-32" x2="182" y2="30" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="253" y1="-60" x2="253" y2="20" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="110" y1="400" x2="110" y2="412" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- dot markers at vessel attachment points -->
  <circle cx="105" cy="30" r="2.5" fill="#555"/>
  <circle cx="182" cy="30" r="2.5" fill="#555"/>
  <circle cx="253" cy="20" r="2.5" fill="#555"/>
  <circle cx="110" cy="400" r="2.5" fill="#555"/>

  <!-- vessel labels -->
  <text x="105" y="-64" fill="#222" text-anchor="middle">Superior Vena Cava</text>
  <text x="182" y="-36" fill="#222" text-anchor="middle">Pulmonary Artery</text>
  <text x="253" y="-64" fill="#222" text-anchor="middle">Aorta</text>
  <text x="110" y="425" fill="#222" text-anchor="middle">Inferior Vena Cava</text>

  <!-- chamber labels -->
  <text x="140" y="154" fill="#fff" text-anchor="middle" font-weight="600">Right Atrium</text>
  <text x="260" y="154" fill="#fff" text-anchor="middle" font-weight="600">Left Atrium</text>
  <text x="140" y="274" fill="#fff" text-anchor="middle" font-weight="600">Right Ventricle</text>
  <text x="260" y="274" fill="#fff" text-anchor="middle" font-weight="600">Left Ventricle</text>

</svg>
